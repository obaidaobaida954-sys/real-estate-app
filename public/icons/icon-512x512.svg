<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 192 192">
  <!-- خلفية داكنة مستديرة مثل الشعار بالتطبيق -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2108"/>
      <stop offset="100%" stop-color="#1a1508"/>
    </linearGradient>
    <linearGradient id="houseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- خلفية -->
  <rect width="192" height="192" rx="42" fill="url(#bgGrad)"/>
  
  <!-- توهج ذهبي خفيف في المنتصف -->
  <circle cx="96" cy="96" r="60" fill="#f59e0b" opacity="0.08"/>
  
  <!-- أيقونة البيت - مطابقة للشعار -->
  <!-- سقف البيت -->
  <path d="M96 52 L140 85 L140 140 L52 140 L52 85 Z" fill="none"/>
  <path d="M44 89 L96 50 L148 89" stroke="url(#houseGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
  
  <!-- جدران البيت -->
  <rect x="60" y="88" width="72" height="52" rx="3" fill="url(#houseGrad)" opacity="0.15"/>
  
  <!-- باب -->
  <path d="M84 140 L84 112 Q96 105 108 112 L108 140" fill="url(#houseGrad)" opacity="0.9"/>
  
  <!-- نافذة يسار -->
  <rect x="65" y="100" width="14" height="14" rx="3" fill="url(#houseGrad)" opacity="0.9"/>
  
  <!-- نافذة يمين -->  
  <rect x="113" y="100" width="14" height="14" rx="3" fill="url(#houseGrad)" opacity="0.9"/>
  
  <!-- خط قاعدة -->
  <line x1="52" y1="140" x2="140" y2="140" stroke="url(#houseGrad)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
</svg>